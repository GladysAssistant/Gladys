name: Build & push canvas image → ghcr.io

# Déclenché à chaque push sur la branche de développement du canvas,
# et manuellement via l'onglet "Actions" de GitHub.
on:
  push:
    branches:
      - feat/canvas_style
  workflow_dispatch:

# Le GITHUB_TOKEN doit pouvoir écrire des packages (images ghcr.io)
permissions:
  contents: read
  packages: write

jobs:
  # ── Étape 1 : compilation du frontend ─────────────────────────────
  build-front:
    name: Compiler le frontend
    runs-on: ubuntu-22.04
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 💽 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: 📦 Installer les dépendances front
        working-directory: ./front
        run: npm ci

      - name: 🏗️ Compiler le front
        working-directory: ./front
        run: npm run build
        env:
          NODE_OPTIONS: --openssl-legacy-provider

      - name: ↗️ Uploader l'artifact (build frontend)
        uses: actions/upload-artifact@v4
        with:
          name: front-build
          path: front/build
          retention-days: 1

  # ── Étape 2 : build & push de l'image Docker ──────────────────────
  docker:
    name: Build & push image Docker
    needs: build-front
    runs-on: ubuntu-22.04
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: ↙️ Télécharger l'artifact frontend
        uses: actions/download-artifact@v4
        with:
          name: front-build
          path: static

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Connexion à GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Métadonnées Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/gladys
          tags: |
            type=raw,value=canvas-test
            type=sha,prefix=canvas-,format=short

      - name: 🐳 Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.buildx
          push: true
          # amd64 uniquement pour réduire le temps de build en dev
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 📋 Résumé
        run: |
          echo "## Image publiée sur ghcr.io 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Tags :" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Commande de test :" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker run -d -p 8080:1443 \\" >> $GITHUB_STEP_SUMMARY
          echo "  -e NODE_ENV=production \\" >> $GITHUB_STEP_SUMMARY
          echo "  -e SERVER_PORT=1443 \\" >> $GITHUB_STEP_SUMMARY
          echo "  -e SQLITE_FILE_PATH=/data/gladys-dev.db \\" >> $GITHUB_STEP_SUMMARY
          echo "  -v gladys-canvas-data:/data \\" >> $GITHUB_STEP_SUMMARY
          echo "  ghcr.io/${{ github.repository_owner }}/gladys:canvas-test" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
