name: Pull request tests
run-name: Pull request tests ${{ github.head_ref }}

on:
  pull_request:
    # claude/** lets stacked pull requests (based on a feature branch
    # instead of master) run the same CI as regular pull requests
    branches: [master, 'claude/**']
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  test-front:
    name: Front test
    runs-on: ubuntu-22.04
    steps:
      - name: ⬇️ Checkout Gladys code
        uses: actions/checkout@v3
      - name: 💽 Setup nodejs
        uses: actions/setup-node@v3
        with:
          node-version-file: 'front/package.json'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - name: 📦 Install Global NPM Packages
        run: |
          sudo npm install typescript node-gyp -g
      - name: 📦 Install NPM front packages
        working-directory: ./front
        run: |
          npm ci
      - name: 🧐 Prettier check
        working-directory: ./front
        run: |
          npm run prettier-check
      - name: 👕 ESlint
        working-directory: ./front
        run: |
          npm run eslint
      - name: 🌐 Integration comparison
        working-directory: ./front
        run: |
          npm run compare-translations
  test-server:
    name: Server test
    runs-on: ubuntu-22.04
    steps:
      - name: ⬇️ Checkout Gladys code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2
      - name: 💽 Setup nodejs
        uses: actions/setup-node@v3
        with:
          node-version-file: 'server/package.json'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - name: 💽 Install System Dependencies
        run: |
          sudo apt update
          sudo apt-get install -y libudev-dev sqlite3 openssl python-is-python3
      - name: 📦 Install Global NPM Packages
        run: |
          sudo npm install typescript node-gyp -g
      - name: 📦 Install NPM server packages
        working-directory: ./server
        run: |
          npm ci
      - name: 🧐 Prettier check
        working-directory: ./server
        run: |
          npm run prettier-check
      - name: 👕 ESlint
        working-directory: ./server
        run: |
          npm run eslint
      - name: ✅ Test with coverage
        working-directory: ./server
        run: |
          npm run coverage
      - name: 🔐 Dependencies security audit
        working-directory: ./server
        run: npm audit --production --audit-level=critical || true
      - name: 📄 Codecov report upload
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: true
          token: 08cd0d46-0291-42ed-b352-50924cb6cca6

          ## Yes, we are storing the CODECOV token in plain text here and not as a secret.
          ## This is because Codecov report upload keeps failing because of a Github Action rate limit
          ## And as we are an open source project, we need forks to be able to upload reports as well, so
          ## we followed the recommandatiom from CodeCov:
          ## https://community.codecov.com/t/upload-issues-unable-to-locate-build-via-github-actions-api/3954
          ## It's not that dangerous to do it, and it's the best tradeoff we could find
  cypress-run:
    name: Cypress run
    runs-on: ubuntu-22.04
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v3
      - name: 💽 Setup nodejs
        uses: actions/setup-node@v3
        with:
          node-version-file: 'front/package.json'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - name: 💽 Install System Dependencies
        run: |
          sudo apt update
          sudo apt-get install -y libudev-dev sqlite3 openssl python-is-python3
      - name: 📦 Install NPM packages
        run: |
          npm ci && npm run install-server:dev
      - name: ✅ Cypress run
        uses: cypress-io/github-action@v3.1.0
        with:
          install: false
          start: npm run start:cypress
          wait-on: 'http://localhost:1444'
          # The front is now built (Vite) before being served: leave enough time
          wait-on-timeout: 300
          config-file: ./front/cypress/cypress.config.js
          project: ./front
          command: npm run cypress:run
  build-front:
    if: github.event.pull_request.draft == false
    name: Front build
    runs-on: ubuntu-22.04
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v3
      - name: 💽 Setup nodejs
        uses: actions/setup-node@v3
        with:
          node-version-file: 'front/package.json'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - name: 📦 Install NPM front packages
        working-directory: ./front
        run: |
          npm ci
      - name: 🏗️ Build front
        working-directory: ./front
        run: |
          npm run build
      - name: ↗️ Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: static
          path: front/build
  docker:
    if: github.event.pull_request.draft == false
    needs: build-front
    name: Docker magic !
    runs-on: ubuntu-22.04
    # Needed to push the image to the GitHub Container Registry (ghcr.io)
    # and to comment on the pull request.
    permissions:
      contents: read
      packages: write
      pull-requests: write
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v3
      - name: 🏷️ Compute image tag from branch name
        id: image_tag
        # github.head_ref is attacker-controlled (any branch name), so we pass it
        # through the environment instead of interpolating it into the shell to
        # avoid script injection.
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          # Docker tags only allow [a-zA-Z0-9_.-] and must be 128 chars max,
          # so we sanitize the branch name (e.g. "feature/foo" -> "feature-foo").
          BRANCH_TAG=$(echo "$HEAD_REF" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9._-]+/-/g' | cut -c1-128)
          # A Docker repository name must be lowercase, so we lowercase the
          # owner/repo part as well (e.g. "GladysAssistant/Gladys").
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${REPO}-preview:${BRANCH_TAG}"
          echo "tag=${BRANCH_TAG}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
      - name: 💽 Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: 🐳 Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v2
        with:
          version: latest
      - name: ↙️ Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: static
          path: static
      # Pushing to ghcr.io only works for pull requests opened from a branch of
      # this repository: pull requests coming from forks only get a read-only
      # GITHUB_TOKEN and cannot push packages nor comment.
      - name: 🔑 Login to GitHub Container Registry
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 🐳 Build AMD64 image and push it to ghcr.io
        uses: docker/build-push-action@v3
        with:
          context: .
          file: ./docker/Dockerfile.buildx
          platforms: linux/amd64
          push: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
          tags: ${{ steps.image_tag.outputs.image }}
      - name: 💬 Comment the image on the pull request
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: docker-preview-image
          message: |
            🐳 **A Docker image has been built for this branch and pushed to the GitHub Container Registry.**

            You can test this pull request (AMD64 only) by pulling the image below:

            ```
            ${{ steps.image_tag.outputs.image }}
            ```

            For example, run it with:

            ```bash
            sudo docker run -d \
              --log-driver json-file \
              --log-opt max-size=10m \
              --cgroupns=host \
              --restart=always \
              --privileged \
              --network=host \
              --name gladys-${{ steps.image_tag.outputs.tag }} \
              -e NODE_ENV=production \
              -e SERVER_PORT=80 \
              -e TZ=Europe/Paris \
              -e SQLITE_FILE_PATH=/var/lib/gladysassistant/gladys-production.db \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v /var/lib/gladysassistant:/var/lib/gladysassistant \
              -v /dev:/dev \
              -v /run/udev:/run/udev:ro \
              ${{ steps.image_tag.outputs.image }}
            ```

            This comment and the image are automatically updated on every new commit pushed to this pull request.
